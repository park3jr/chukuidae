<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>축의대 관리</title>
<style>
  :root {
    --primary: #8e5bc4;
    --primary-dark: #6a3b9d;
    --primary-light: #e7daf6;
    --accent: #4f2d72;
    --bg: #f5f1fa;
    --surface: #ffffff;
    --border: #e1d4f0;
    --text: #352c40;
    --muted: #8a80a0;
    --danger: #c0392b;
    --danger-dark: #962d22;
    --radius: 14px;
    --shadow: 0 6px 20px rgba(110, 60, 160, 0.1);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: linear-gradient(180deg, #f8f4fc 0%, var(--bg) 220px);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  header {
    background: linear-gradient(135deg, var(--primary-dark), var(--primary) 60%, #b98ee0);
    color: #fff;
    padding: 34px 24px 30px;
    text-align: center;
    box-shadow: 0 4px 16px rgba(110, 60, 160, 0.25);
    position: relative;
    overflow: hidden;
  }
  header::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.18), transparent 60%);
  }
  header h1 {
    margin: 0;
    font-size: 26px;
    letter-spacing: 10px;
    font-weight: 700;
    position: relative;
  }
  .container {
    max-width: 1060px;
    margin: -22px auto 0;
    padding: 0 18px 60px;
    position: relative;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    margin-bottom: 22px;
    box-shadow: var(--shadow);
    transition: box-shadow .2s, transform .2s;
  }
  .card h2 {
    font-size: 15px;
    margin: 0 0 16px;
    color: var(--primary-dark);
    font-weight: 700;
    letter-spacing: .5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-head h2 { margin-bottom: 16px; }
  .toggle-btn {
    padding: 6px 12px;
    font-size: 12px;
    box-shadow: none;
  }
  .card h2::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--primary);
    display: inline-block;
  }
  .form-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    align-items: end;
  }
  .next-no {
    font-size: 13px;
    color: var(--muted);
    margin: 0 0 16px;
    background: var(--primary-light);
    border-radius: 8px;
    padding: 8px 12px;
    display: inline-block;
  }
  .next-no b { color: var(--primary-dark); font-size: 14px; }
  .undo-bar {
    margin-top: 12px;
    padding: 10px 14px;
    background: #fff7e0;
    border: 1px solid #f0dca0;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    font-size: 13px;
    color: #7a6320;
  }
  .undo-bar button { padding: 6px 12px; font-size: 12px; box-shadow: none; }
  td.editable-cell { cursor: pointer; transition: background .12s; }
  td.editable-cell:hover { background: #f1e4fa; }
  td.editable-cell input {
    width: 100%;
    text-align: inherit;
    padding: 2px 6px;
    border: 1.5px solid var(--primary);
    border-radius: 6px;
    font-size: 14px;
    outline: none;
    box-shadow: 0 0 0 3px rgba(142, 91, 196, 0.18);
  }
  .form-grid .field { display: flex; flex-direction: column; }
  .form-grid label { font-size: 12px; margin-bottom: 6px; color: var(--muted); font-weight: 600; }
  .form-grid input, .form-grid select {
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 9px;
    font-size: 14px;
    background: #fdfcf9;
    transition: border-color .15s, box-shadow .15s;
  }
  .form-grid input:focus, .form-grid select:focus, .toolbar input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(142, 91, 196, 0.18);
    background: #fff;
  }
  button {
    cursor: pointer;
    border: none;
    border-radius: 9px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    background: var(--primary);
    color: #fff;
    transition: background .15s, transform .1s, box-shadow .15s;
    box-shadow: 0 2px 6px rgba(142, 91, 196, 0.35);
  }
  button:hover { background: var(--primary-dark); transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  button.secondary { background: #7d7466; box-shadow: 0 2px 6px rgba(0,0,0,0.12); }
  button.secondary:hover { background: #5f584c; }
  button.danger { background: var(--danger); padding: 5px 12px; font-size: 12px; box-shadow: none; }
  button.danger:hover { background: var(--danger-dark); }
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .toolbar input[type="text"] {
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 9px;
    width: 240px;
    background: #fdfcf9;
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    text-align: center;
  }
  .stats .stat-box {
    background: linear-gradient(160deg, #fbf8fe, var(--primary-light));
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 10px;
    transition: transform .15s;
  }
  .stats .stat-box:hover { transform: translateY(-2px); }
  .stats .stat-box .label { font-size: 12px; color: var(--muted); font-weight: 600; }
  .stats .stat-box .value { font-size: 23px; font-weight: 800; color: var(--primary-dark); margin-top: 6px; }
  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 14px;
  }
  th, td {
    border-bottom: 1px solid var(--border);
    padding: 5px 8px;
    text-align: center;
  }
  th {
    background: var(--primary-light);
    color: var(--primary-dark);
    font-weight: 700;
    position: sticky;
    top: 0;
  }
  th[data-sort] { cursor: pointer; user-select: none; }
  th[data-sort]:hover { background: #ddc4ef; }
  th[data-sort].active { color: var(--accent); }
  .sort-arrow { display: inline-block; width: 10px; font-size: 11px; }
  th:first-child { border-radius: 8px 0 0 0; }
  th:last-child { border-radius: 0 8px 0 0; }
  tbody tr { transition: background .12s; }
  tbody tr:nth-child(even) { background: #faf6fd; }
  tbody tr:hover { background: #f1e4fa; }
  td.amount { text-align: right; padding-right: 16px; font-weight: 600; color: var(--accent); }
  td.name { font-weight: 700; }
  td.memo { text-align: left; color: var(--muted); }
  .empty { text-align: center; color: var(--muted); padding: 30px; font-size: 14px; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  @media print {
    .no-print { display: none !important; }
    .card { box-shadow: none; border: none; }
    body { background: #fff; }
  }
</style>
</head>
<body>

<header>
  <h1>ㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋ</h1>
</header>

<div class="container">

  <div class="card no-print">
    <h2>접수 입력</h2>
    <p class="next-no">No. <b id="nextNoLabel">1</b> 번으로 자동 등록됩니다. (잘못 등록된 경우 아래 목록에서 번호를 클릭해 수정하세요)</p>
    <div class="form-grid">
      <div class="field">
        <label>이름</label>
        <input type="text" id="inputName" lang="ko" inputmode="text" autocapitalize="off" autocomplete="off" spellcheck="false" placeholder="하객 이름">
      </div>
      <div class="field">
        <label>관계/소속</label>
        <input type="text" id="inputRel" placeholder="예: 친구, 회사">
      </div>
      <div class="field">
        <label>금액(원)</label>
        <input type="text" id="inputAmount" inputmode="numeric" maxlength="12" placeholder="예: 50000 (.키 입력 시 000 추가)">
      </div>
      <div class="field">
        <button id="addBtn" style="width:100%">등록</button>
      </div>
    </div>
    <div id="undoBar" class="undo-bar" style="display:none">
      <span id="undoText"></span>
      <button class="secondary" id="undoBtn">되돌리기</button>
    </div>
  </div>

  <div class="card">
    <div class="card-head">
      <h2>통계</h2>
      <button class="secondary toggle-btn no-print" id="statsToggleBtn">숨기기</button>
    </div>
    <div class="stats" id="statsBox">
      <div class="stat-box">
        <div class="label">총 인원</div>
        <div class="value" id="statCount">0 명</div>
      </div>
      <div class="stat-box">
        <div class="label">총 축의금</div>
        <div class="value" id="statTotal">0 원</div>
      </div>
      <div class="stat-box">
        <div class="label">평균 금액</div>
        <div class="value" id="statAvg">0 원</div>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>방명록 / 하객 명단</h2>
    <div class="toolbar no-print">
      <input type="text" id="searchBox" placeholder="이름/관계 검색">
      <div class="btn-row">
        <button class="secondary" id="exportBtn">CSV 내보내기</button>
        <button class="secondary" id="printBtn">인쇄</button>
        <button class="secondary" id="restoreBtn">백업 복원</button>
        <button class="danger" id="clearAllBtn">전체 삭제</button>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th style="width:80px" data-sort="no" title="클릭하여 정렬">No. <span class="sort-arrow"></span></th>
          <th style="width:160px" data-sort="name" title="클릭하여 정렬">이름 <span class="sort-arrow"></span></th>
          <th data-sort="rel" title="클릭하여 정렬">관계/소속 <span class="sort-arrow"></span></th>
          <th style="width:120px" data-sort="amount" title="클릭하여 정렬">금액 <span class="sort-arrow"></span></th>
          <th data-sort="memo" title="클릭하여 정렬">비고 <span class="sort-arrow"></span></th>
          <th style="width:140px" data-sort="createdAt" title="클릭하여 정렬">등록시각 <span class="sort-arrow"></span></th>
          <th class="no-print" style="width:70px">삭제</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div id="emptyMsg" class="empty" style="display:none">등록된 내역이 없습니다.</div>
  </div>

</div>

<script>
(function () {
  const STORAGE_KEY = 'chukuidae_records';
  const BACKUP_KEY = 'chukuidae_backups';
  const MAX_BACKUPS = 20;

  function pushBackup(records) {
    try {
      const backups = JSON.parse(localStorage.getItem(BACKUP_KEY)) || [];
      backups.push({ time: Date.now(), data: records });
      while (backups.length > MAX_BACKUPS) backups.shift();
      localStorage.setItem(BACKUP_KEY, JSON.stringify(backups));
    } catch (e) {
      // 백업 저장 실패는 본 저장에 영향을 주지 않도록 무시
    }
  }

  function loadRecords() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {
      // 본 데이터가 손상된 경우 아래에서 백업으로 복구 시도
    }
    try {
      const backups = JSON.parse(localStorage.getItem(BACKUP_KEY)) || [];
      if (backups.length) {
        const latest = backups[backups.length - 1];
        alert(`저장된 데이터에 문제가 있어 최근 백업(${new Date(latest.time).toLocaleString('ko-KR')})으로 복구했습니다.`);
        return latest.data || [];
      }
    } catch (e) {
      // 백업도 손상된 경우 빈 목록으로 시작
    }
    return [];
  }

  function saveRecords(records) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    pushBackup(records);
  }

  function restoreFromBackup() {
    let backups = [];
    try {
      backups = JSON.parse(localStorage.getItem(BACKUP_KEY)) || [];
    } catch (e) {}
    if (!backups.length) {
      alert('복원할 백업이 없습니다.');
      return;
    }
    const recentFirst = backups.slice().reverse();
    const list = recentFirst
      .map((b, i) => `${i + 1}. ${new Date(b.time).toLocaleString('ko-KR')} (${(b.data || []).length}건)`)
      .join('\n');
    const input = prompt(`복원할 백업 번호를 입력하세요.\n(1번이 가장 최근 백업입니다)\n\n${list}`, '1');
    if (!input) return;
    const idx = parseInt(input, 10) - 1;
    if (isNaN(idx) || idx < 0 || idx >= recentFirst.length) {
      alert('올바른 번호를 입력해주세요.');
      return;
    }
    const target = recentFirst[idx];
    if (!confirm(`${new Date(target.time).toLocaleString('ko-KR')} 시점(${(target.data || []).length}건)으로 복원하시겠습니까?\n현재 데이터는 덮어씌워집니다.`)) return;
    records = target.data || [];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    setNextNo();
    hideActionBar();
    render();
    alert('복원되었습니다.');
  }

  let records = loadRecords();
  let lastAction = null;
  let sortField = 'no';
  let sortDir = 'desc';

  const inputName = document.getElementById('inputName');
  const inputRel = document.getElementById('inputRel');
  const inputAmount = document.getElementById('inputAmount');
  const addBtn = document.getElementById('addBtn');
  const tableBody = document.getElementById('tableBody');
  const emptyMsg = document.getElementById('emptyMsg');
  const searchBox = document.getElementById('searchBox');
  const exportBtn = document.getElementById('exportBtn');
  const printBtn = document.getElementById('printBtn');
  const restoreBtn = document.getElementById('restoreBtn');
  const clearAllBtn = document.getElementById('clearAllBtn');
  const undoBar = document.getElementById('undoBar');
  const undoText = document.getElementById('undoText');
  const undoBtn = document.getElementById('undoBtn');
  const statCount = document.getElementById('statCount');
  const statTotal = document.getElementById('statTotal');
  const statAvg = document.getElementById('statAvg');
  const nextNoLabel = document.getElementById('nextNoLabel');
  const statsBox = document.getElementById('statsBox');
  const statsToggleBtn = document.getElementById('statsToggleBtn');
  const sortHeaders = document.querySelectorAll('th[data-sort]');

  const STATS_HIDDEN_KEY = 'chukuidae_stats_hidden';

  function applyStatsVisibility() {
    const hidden = localStorage.getItem(STATS_HIDDEN_KEY) === '1';
    statsBox.style.display = hidden ? 'none' : 'grid';
    statsToggleBtn.textContent = hidden ? '보이기' : '숨기기';
  }

  function formatNumber(n) {
    return Number(n || 0).toLocaleString('ko-KR');
  }

  function formatTime(ts) {
    const d = new Date(ts);
    const pad = n => String(n).padStart(2, '0');
    return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }

  function getNextNo() {
    const nums = records
      .map(r => parseInt(r.no, 10))
      .filter(n => !isNaN(n));
    const max = nums.length ? Math.max(...nums) : 0;
    return String(max + 1);
  }

  function setNextNo() {
    nextNoLabel.textContent = getNextNo();
  }

  const MAX_AMOUNT_DIGITS = 9; // 최대 999,999,999원

  function parseAmountDigits(str) {
    const digits = String(str || '').replace(/[^0-9]/g, '').slice(0, MAX_AMOUNT_DIGITS);
    return digits ? Number(digits) : 0;
  }

  function handleAmountInput() {
    const digits = inputAmount.value.replace(/[^0-9]/g, '').slice(0, MAX_AMOUNT_DIGITS);
    inputAmount.value = digits ? Number(digits).toLocaleString('ko-KR') : '';
  }

  function handleAmountDotShortcut(e) {
    if (e.key !== '.') return;
    e.preventDefault();
    const digits = e.target.value.replace(/[^0-9]/g, '');
    const next = digits.slice(0, MAX_AMOUNT_DIGITS - 3) + '000';
    e.target.value = Number(next).toLocaleString('ko-KR');
  }

  function compareRecords(a, b, field) {
    if (field === 'amount' || field === 'createdAt') {
      return Number(a[field] || 0) - Number(b[field] || 0);
    }
    if (field === 'no') {
      const an = parseInt(a.no, 10);
      const bn = parseInt(b.no, 10);
      if (!isNaN(an) && !isNaN(bn)) return an - bn;
      return String(a.no || '').localeCompare(String(b.no || ''), 'ko');
    }
    return String(a[field] || '').localeCompare(String(b[field] || ''), 'ko');
  }

  function updateSortHeaders() {
    sortHeaders.forEach(th => {
      const arrow = th.querySelector('.sort-arrow');
      if (th.dataset.sort === sortField) {
        th.classList.add('active');
        arrow.textContent = sortDir === 'asc' ? '▲' : '▼';
      } else {
        th.classList.remove('active');
        arrow.textContent = '';
      }
    });
  }

  function render() {
    const keyword = searchBox.value.trim().toLowerCase();
    const filtered = records.filter(r => {
      if (!keyword) return true;
      return (r.name && r.name.toLowerCase().includes(keyword)) ||
             (r.rel && r.rel.toLowerCase().includes(keyword));
    });

    updateSortHeaders();

    tableBody.innerHTML = '';
    if (filtered.length === 0) {
      emptyMsg.style.display = 'block';
    } else {
      emptyMsg.style.display = 'none';
      filtered
        .slice()
        .sort((a, b) => (sortDir === 'asc' ? 1 : -1) * compareRecords(a, b, sortField))
        .forEach(r => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="editable-cell" data-id="${r.id}" data-field="no" title="클릭하여 수정">${escapeHtml(r.no || '-')}</td>
            <td class="editable-cell name" data-id="${r.id}" data-field="name" title="클릭하여 수정">${escapeHtml(r.name || '-')}</td>
            <td class="editable-cell" data-id="${r.id}" data-field="rel" title="클릭하여 수정">${escapeHtml(r.rel || '-')}</td>
            <td class="editable-cell amount" data-id="${r.id}" data-field="amount" title="클릭하여 수정">${formatNumber(r.amount)} 원</td>
            <td class="editable-cell memo" data-id="${r.id}" data-field="memo" title="클릭하여 수정">${escapeHtml(r.memo || '-')}</td>
            <td>${formatTime(r.createdAt)}</td>
            <td class="no-print"><button class="danger" data-id="${r.id}">삭제</button></td>
          `;
          tableBody.appendChild(tr);
        });
    }

    const count = records.length;
    const total = records.reduce((sum, r) => sum + Number(r.amount || 0), 0);
    const avg = count > 0 ? Math.round(total / count) : 0;
    statCount.textContent = `${count} 명`;
    statTotal.textContent = `${formatNumber(total)} 원`;
    statAvg.textContent = `${formatNumber(avg)} 원`;
  }

  function escapeHtml(str) {
    return String(str ?? '').replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function addRecord() {
    const name = inputName.value.trim();
    const amount = parseAmountDigits(inputAmount.value);
    if (!name) {
      alert('이름을 입력해주세요.');
      inputName.focus();
      return;
    }
    if (!amount || amount <= 0) {
      alert('금액을 올바르게 입력해주세요.');
      inputAmount.focus();
      return;
    }

    const isDuplicate = records.some(r => r.name === name && Number(r.amount) === amount);
    if (isDuplicate) {
      if (!confirm(`이미 같은 이름(${name})과 같은 금액(${formatNumber(amount)}원)으로 등록된 내역이 있습니다.\n그래도 등록하시겠습니까?`)) {
        return;
      }
    }

    const newRecord = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2),
      no: getNextNo(),
      name,
      rel: inputRel.value.trim() || '-',
      amount,
      memo: '',
      createdAt: Date.now()
    };
    records.push(newRecord);
    saveRecords(records);

    inputName.value = '';
    inputRel.value = '';
    inputAmount.value = '';
    setNextNo();
    inputName.focus();

    lastAction = { type: 'add', id: newRecord.id };
    showActionBar(`${newRecord.name}(${formatNumber(newRecord.amount)}원) 등록됨`);

    render();
  }

  function showActionBar(text) {
    undoText.textContent = text;
    undoBar.style.display = 'flex';
  }

  function hideActionBar() {
    lastAction = null;
    undoBar.style.display = 'none';
  }

  function removeRecordById(id) {
    records = records.filter(r => r.id !== id);
    saveRecords(records);
    setNextNo();
  }

  function deleteRecord(id) {
    const target = records.find(r => r.id === id);
    if (!target) return;
    removeRecordById(id);
    lastAction = { type: 'delete', record: target };
    showActionBar(`${target.name}(${formatNumber(target.amount)}원) 삭제됨`);
    render();
  }

  function editCell(td) {
    const id = td.dataset.id;
    const field = td.dataset.field;
    const record = records.find(r => r.id === id);
    if (!record) return;

    const input = document.createElement('input');
    input.type = 'text';
    if (field === 'amount') {
      input.inputMode = 'numeric';
      input.maxLength = 12;
      input.value = record[field] ? formatNumber(record[field]) : '';
      input.addEventListener('input', () => {
        const digits = input.value.replace(/[^0-9]/g, '').slice(0, MAX_AMOUNT_DIGITS);
        input.value = digits ? Number(digits).toLocaleString('ko-KR') : '';
      });
      input.addEventListener('keydown', handleAmountDotShortcut);
    } else {
      input.value = record[field] || '';
    }

    td.textContent = '';
    td.appendChild(input);
    input.focus();
    input.select();

    let cancelled = false;
    const commit = () => {
      if (cancelled) return;
      if (field === 'amount') {
        record[field] = parseAmountDigits(input.value);
      } else if (field === 'rel') {
        record[field] = input.value.trim() || '-';
      } else {
        record[field] = input.value.trim();
      }
      saveRecords(records);
      if (field === 'no') setNextNo();
      render();
    };

    input.addEventListener('blur', commit);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') input.blur();
      if (e.key === 'Escape') { cancelled = true; render(); }
    });
  }

  function exportCsv() {
    const header = ['No.', '이름', '관계/소속', '금액', '비고', '등록시각'];
    const rows = records
      .slice()
      .sort((a, b) => b.createdAt - a.createdAt)
      .map(r => [
        r.no || '',
        r.name,
        r.rel || '',
        r.amount,
        r.memo || '',
        new Date(r.createdAt).toLocaleString('ko-KR')
      ]);
    const csv = [header, ...rows]
      .map(row => row.map(v => `"${String(v).replace(/"/g, '""')}"`).join(','))
      .join('\r\n');
    const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `축의대_내역_${new Date().toISOString().slice(0, 10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  addBtn.addEventListener('click', addRecord);
  undoBtn.addEventListener('click', () => {
    if (!lastAction) return;
    if (lastAction.type === 'add') {
      removeRecordById(lastAction.id);
    } else if (lastAction.type === 'delete') {
      records.push(lastAction.record);
      saveRecords(records);
      setNextNo();
    }
    hideActionBar();
    render();
  });
  [inputName, inputRel, inputAmount].forEach(el => {
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter') addRecord();
    });
  });
  inputAmount.addEventListener('input', handleAmountInput);
  inputAmount.addEventListener('keydown', handleAmountDotShortcut);
  statsToggleBtn.addEventListener('click', () => {
    const hidden = localStorage.getItem(STATS_HIDDEN_KEY) === '1';
    localStorage.setItem(STATS_HIDDEN_KEY, hidden ? '0' : '1');
    applyStatsVisibility();
  });
  searchBox.addEventListener('input', render);
  sortHeaders.forEach(th => {
    th.addEventListener('click', () => {
      const field = th.dataset.sort;
      if (sortField === field) {
        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        sortField = field;
        sortDir = 'asc';
      }
      render();
    });
  });
  exportBtn.addEventListener('click', exportCsv);
  printBtn.addEventListener('click', () => window.print());
  restoreBtn.addEventListener('click', restoreFromBackup);
  clearAllBtn.addEventListener('click', () => {
    if (records.length === 0) return;
    if (confirm('전체 내역을 삭제하시겠습니까? 복구할 수 없습니다.')) {
      records = [];
      saveRecords(records);
      setNextNo();
      hideActionBar();
      render();
    }
  });
  tableBody.addEventListener('click', e => {
    const btn = e.target.closest('button[data-id]');
    if (btn) { deleteRecord(btn.dataset.id); return; }
    const cell = e.target.closest('td.editable-cell');
    if (cell && !cell.querySelector('input')) editCell(cell);
  });

  setNextNo();
  applyStatsVisibility();
  render();
})();
</script>

</body>
</html>
